name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libavfilter-dev \
            libpipewire-0.3-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          modules: qtmultimedia
          cache: true

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

  macos:
    name: Build & Test (macOS)
    # macOS 15 runner: SCRecordingOutput / .hevcWithAlpha need macOS 15+.
    # The runner has Xcode + Swift toolchain pre-installed.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew update
          brew install ninja ffmpeg pkg-config

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.5.3
          modules: qtmultimedia
          cache: true

      - name: Configure
        # No CODESIGN_IDENTITY available on CI — CMake falls back to ad-hoc.
        run: cmake --preset default

      - name: Build
        run: cmake --build build/default --parallel

      - name: Run tests
        working-directory: build/default
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure
